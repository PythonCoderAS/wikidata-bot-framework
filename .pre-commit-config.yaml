repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: destroyed-symlinks
      - id: name-tests-test
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.6
    hooks:
      # Run the linter.
      - id: ruff
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
  - repo: local
    hooks:
      - id: typelint
        name: typelint
        entry: uv run poe typelint
        language: system
        types: [python]
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: npm run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: docs-lint
        name: docs-lint
        entry: uv run poe docs-lint
        language: system
        pass_filenames: false
      - id: test
        name: test
        entry: uv run poe test
        language: system
        pass_filenames: false
      - id: mdlint
        name: mdlint
        entry: npm run mdlint
        language: system
        pass_filenames: false
