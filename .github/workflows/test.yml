name: Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --group test

      - name: Add venv to path
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Copy default user config
        run: cp user-config-sample.py user-config.py

      - name: Add username/password
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          echo "usernames[family][mylang] = '$USER_NAME'" >> user-config.py
          echo "$USER_PASSWORD" > user-password.py
        env:
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Test
        run: python -m pytest --simulate

      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: py-${{ matrix.python-version }}
          parallel: true

  coverage-finish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --group test

      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: "py-3.12,py-3.13,py-3.14"
